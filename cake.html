<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make A Wish, Simran 🎂</title>

    <link rel="stylesheet" href="cake.css">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1 class="title">
        Make A Wish ✨
    </h1>

    <p class="subtitle">
        Close your eyes and get ready...
    </p>

    <!-- Cake -->
    <div class="cake-wrapper">

        <!-- Flames -->
        <div class="candles">

            <div class="candle">
                <div class="flame"></div>
                <div class="stick"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
                <div class="stick"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
                <div class="stick"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
                <div class="stick"></div>
            </div>

        </div>

        <!-- 22 -->
        <div class="number">
            22
        </div>

        <!-- Cake -->
        <div class="cake">

            <div class="icing"></div>

            <div class="layer"></div>

        </div>

    </div>

    <!-- Countdown -->

    <div id="countdown" class="countdown">

        Ready?

    </div>

    <!-- Start Button -->

    <button id="startButton" class="pixelButton">

        Start Countdown 🎂

    </button>

    <!-- Happy Birthday -->

    <div id="birthdayMessage" class="birthdayMessage">

        🎉 HAPPY BIRTHDAY!! 🎉

    </div>

    <!-- Continue -->

    <button id="continueButton" class="continueButton">

        Open Your Letter 💌

    </button>

</div>

<!-- Confetti -->

<div id="confettiContainer"></div>

<script src="cake.js"></script>

</body>
</html>
