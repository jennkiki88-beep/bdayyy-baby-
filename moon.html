<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Thing 🌙</title>

    <link rel="stylesheet" href="moon-style.css">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Pixel Stars -->
    <div class="stars" id="stars"></div>

    <div class="container">

        <!-- Tiny Message -->
        <div class="moon-message">

            <!-- WRITE YOUR OWN MESSAGE HERE -->

            <p>
                YOUR MESSAGE HERE
            </p>

        </div>

        <!-- Giant Clickable Moon -->

        <div class="moon" id="moon">

            <div class="moon-glow"></div>

            <div class="moon-face"></div>

        </div>

        <p class="instruction">
            Click the moon 🌙
        </p>

    </div>

    <!-- Optional click sound -->
    <audio id="moonSound">
        <source src="moon-click.mp3" type="audio/mpeg">
    </audio>

    <script src="moon-script.js"></script>

</body>
</html>
